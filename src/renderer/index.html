<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>Image Compressor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">LM</div>
        <div>
          <div class="brand-name">Legacy Music</div>
          <div class="brand-sub">Image Compressor · Batch · Resize</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Preset</div>
        <select id="presetSelect" class="select"></select>
        <div class="row gap">
          <button id="savePresetBtn" class="btn ghost sm">Save as…</button>
          <button id="deletePresetBtn" class="btn ghost sm">Delete</button>
        </div>
        <div class="row gap">
          <button id="importPresetBtn" class="btn ghost sm">Import</button>
          <button id="exportPresetBtn" class="btn ghost sm">Export</button>
        </div>
      </div>

      <!-- Resize -->
      <div class="panel">
        <label class="switch-row">
          <input type="checkbox" id="resizeEnabled" />
          <span class="panel-title inline">Enable Resize</span>
        </label>
        <div id="resizeFields" class="fields">
          <div class="row gap">
            <label class="field">
              <span>Width</span>
              <input type="number" id="resizeWidth" value="3000" min="1" />
            </label>
            <label class="field">
              <span>Height</span>
              <input type="number" id="resizeHeight" value="3000" min="1" />
            </label>
          </div>
          <label class="field">
            <span>Resize mode</span>
            <select id="resizeMode" class="select">
              <option value="aspect">Maintain Aspect Ratio (can enlarge)</option>
              <option value="fit">Fit Within (no upscale)</option>
              <option value="cover">Crop to Fill (no distortion)</option>
              <option value="exact">Stretch to Exact (may distort)</option>
            </select>
          </label>
        </div>
      </div>

      <!-- Output format -->
      <div class="panel">
        <div class="panel-title">Output Format</div>
        <select id="outputFormat" class="select">
          <option value="jpg">JPG</option>
          <option value="png">PNG</option>
          <option value="webp">WEBP</option>
        </select>
      </div>

      <!-- File size -->
      <div class="panel">
        <label class="switch-row">
          <input type="checkbox" id="sizeEnabled" checked />
          <span class="panel-title inline">Target File Size</span>
        </label>
        <div id="sizeFields" class="fields">
          <div class="seg" id="sizeMode">
            <button data-mode="max" class="seg-btn">Maximum</button>
            <button data-mode="exact" class="seg-btn active">Exact</button>
          </div>
          <div class="row gap">
            <label class="field grow">
              <span>Target size</span>
              <input type="number" id="sizeValue" value="500" min="1" />
            </label>
            <label class="field">
              <span>Unit</span>
              <select id="sizeUnit" class="select">
                <option value="1">KB</option>
                <option value="1024">MB</option>
              </select>
            </label>
          </div>
          <label class="field" id="toleranceField">
            <span>Precision (tolerance)</span>
            <select id="tolerance" class="select">
              <option value="1">±1 KB</option>
              <option value="5" selected>±5 KB</option>
              <option value="10">±10 KB</option>
              <option value="25">±25 KB</option>
            </select>
          </label>
          <label class="switch-row tight">
            <input type="checkbox" id="forceUnder" />
            <span>Force Under Target</span>
          </label>
        </div>
      </div>

      <!-- Advanced -->
      <details class="panel">
        <summary class="panel-title">Advanced — Quality</summary>
        <div class="row gap">
          <label class="field">
            <span>Min quality</span>
            <input type="number" id="qualityMin" value="60" min="1" max="100" />
          </label>
          <label class="field">
            <span>Max quality</span>
            <input type="number" id="qualityMax" value="95" min="1" max="100" />
          </label>
        </div>
      </details>

      <!-- Output options -->
      <div class="panel">
        <div class="panel-title">Output Folder</div>
        <div class="radio-group" id="outputMode">
          <label class="radio"><input type="radio" name="outmode" value="same" checked /> Same Folder</label>
          <label class="radio"><input type="radio" name="outmode" value="new" /> New Folder</label>
          <label class="radio"><input type="radio" name="outmode" value="ask" /> Ask Every Time</label>
        </div>
        <div class="panel-title mt">Naming</div>
        <div class="radio-group" id="namingMode">
          <label class="radio"><input type="radio" name="naming" value="original" /> Keep Original Name</label>
          <label class="radio"><input type="radio" name="naming" value="suffix" checked /> Add Suffix</label>
          <label class="radio"><input type="radio" name="naming" value="rename" /> Rename to Custom Text</label>
        </div>
        <input type="text" id="namingSuffix" class="text-input" value="_compressed"
               placeholder="_compressed or _{size}" />
        <input type="text" id="namingRename" class="text-input" value="artwork"
               placeholder="New file name" hidden />
        <div id="namingHint" class="naming-hint" hidden></div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <div id="statusText" class="status">Ready</div>
        <div class="actions">
          <button id="clearBtn" class="btn ghost">Clear</button>
          <button id="processBtn" class="btn primary" disabled>Process</button>
          <button id="cancelBtn" class="btn danger" hidden>Cancel</button>
        </div>
      </header>

      <div id="dropzone" class="dropzone">
        <div class="dz-inner">
          <div class="dz-icon">⤓</div>
          <div class="dz-title">Drop Images or Folders Here</div>
          <div class="dz-sub">JPG · PNG · WEBP · BMP · TIFF — single files, folders, or nested folders</div>
          <div class="row gap center mt">
            <button id="addFilesBtn" class="btn ghost">Add Files</button>
            <button id="addFolderBtn" class="btn ghost">Add Folder</button>
          </div>
          <div id="fileCount" class="dz-count"></div>
        </div>
      </div>

      <div id="progressBar" class="progress" hidden>
        <div id="progressFill" class="progress-fill"></div>
        <span id="progressLabel" class="progress-label"></span>
      </div>

      <section class="results" id="resultsSection" hidden>
        <div class="results-head">
          <div id="summary" class="summary"></div>
        </div>
        <div class="table-wrap">
          <table class="results-table">
            <thead>
              <tr>
                <th>File</th>
                <th>Original</th>
                <th>Output</th>
                <th>Saved</th>
                <th>Dimensions</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- In-app dialog (replaces unsupported window.prompt/confirm in Electron) -->
  <div id="modalOverlay" class="modal-overlay" hidden>
    <div class="modal">
      <div id="modalTitle" class="modal-title">Save preset</div>
      <div id="modalMessage" class="modal-message" hidden></div>
      <input type="text" id="modalInput" class="text-input" placeholder="Preset name" />
      <div class="modal-actions">
        <button id="modalCancel" class="btn ghost">Cancel</button>
        <button id="modalOk" class="btn primary">Save</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
